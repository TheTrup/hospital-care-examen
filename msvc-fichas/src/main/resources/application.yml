server:
  port: 8085
  forward-headers-strategy: framework

spring:
  application:
    name: msvc-fichas
  datasource:
    url: jdbc:h2:mem:fichasdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api/v1/fichas/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha # Ordena los endpoints alfabéticamente
    tags-sorter: alpha
